<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | IESPP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[#e9e9e9] text-slate-900">
    <main class="flex min-h-screen flex-col items-center justify-start px-4 py-12">

        <!-- Logo superior -->
        <div class="mb-10 flex items-center gap-3 select-none">
            <div class="relative h-14 w-12">
                <div class="absolute left-0 top-0 h-7 w-7 border-[5px] border-[#1687e0]"></div>
                <div class="absolute bottom-0 left-2 h-7 w-7 rounded-full border-[5px] border-[#1687e0] border-t-0"></div>
                <div class="absolute left-4 top-7 h-7 w-7 border-r-[5px] border-t-[5px] border-[#1687e0]"></div>
            </div>

            <div class="flex items-start">
                <span class="text-[44px] font-bold leading-none tracking-tight text-[#003b49]">
                    turnitin
                </span>
                <span class="ml-1 mt-2 text-xs font-semibold text-[#003b49]">™</span>
            </div>
        </div>

        <!-- Card -->
        <section class="w-full max-w-[790px] rounded-md border border-slate-300 bg-white px-6 py-10 shadow-sm sm:px-10 sm:py-14 md:px-16">
            <div class="mx-auto w-full max-w-[625px]">
                <h1 class="text-[34px] font-bold tracking-tight text-slate-950">
                    Iniciar sesión
                </h1>

                {% if messages %}
                    <div class="mt-6 space-y-3">
                        {% for message in messages %}
                            <div class="rounded-md border px-4 py-3 text-sm font-medium
                                {% if message.tags == 'success' %}
                                    border-emerald-200 bg-emerald-50 text-emerald-700
                                {% elif message.tags == 'error' %}
                                    border-red-200 bg-red-50 text-red-700
                                {% else %}
                                    border-sky-200 bg-sky-50 text-sky-700
                                {% endif %}
                            ">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}

                <form method="post" class="mt-10">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">

                    <!-- Correo -->
                    <div>
                        <label for="username_or_email" class="mb-2 block text-[15px] font-bold text-slate-900">
                            Correo electrónico
                        </label>

                        <input id="username_or_email"
                               name="username_or_email"
                               type="text"
                               autocomplete="username"
                               required
                               placeholder="Correo electrónico"
                               class="h-[58px] w-full rounded-xl border border-slate-400 bg-white px-5 text-[16px] text-slate-900 outline-none transition placeholder:text-slate-500 focus:border-slate-700 focus:ring-2 focus:ring-slate-200">
                    </div>

                    <!-- Password -->
                    <div class="mt-7">
                        <label for="password" class="mb-2 block text-[15px] font-bold text-slate-900">
                            Contraseña
                        </label>

                        <div class="relative">
                            <input id="password"
                                   name="password"
                                   type="password"
                                   autocomplete="current-password"
                                   required
                                   placeholder="Contraseña"
                                   class="h-[58px] w-full rounded-xl border border-slate-400 bg-white px-5 pr-14 text-[16px] text-slate-900 outline-none transition placeholder:text-slate-500 focus:border-slate-700 focus:ring-2 focus:ring-slate-200">

                            <button type="button"
                                    id="togglePassword"
                                    class="absolute inset-y-0 right-0 flex w-14 items-center justify-center text-slate-800 hover:text-slate-950"
                                    aria-label="Mostrar contraseña">
                                <svg id="eyeOpen" class="h-6 w-6" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                    <path d="M2.5 12C4.6 7.8 7.9 5.5 12 5.5C16.1 5.5 19.4 7.8 21.5 12C19.4 16.2 16.1 18.5 12 18.5C7.9 18.5 4.6 16.2 2.5 12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                    <path d="M12 14.5C13.3807 14.5 14.5 13.3807 14.5 12C14.5 10.6193 13.3807 9.5 12 9.5C10.6193 9.5 9.5 10.6193 9.5 12C9.5 13.3807 10.6193 14.5 12 14.5Z" stroke="currentColor" stroke-width="2"/>
                                </svg>

                                <svg id="eyeClosed" class="hidden h-6 w-6" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                    <path d="M3 3L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                    <path d="M10.58 10.58C10.21 10.95 10 11.46 10 12C10 13.1 10.9 14 12 14C12.54 14 13.05 13.79 13.42 13.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                    <path d="M9.88 5.09C10.57 4.9 11.28 4.8 12 4.8C16.7 4.8 20.2 7.73 22 12C21.18 13.95 19.95 15.55 18.39 16.69" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M6.23 6.23C4.72 7.34 3.52 8.95 2.5 12C4.3 16.27 7.8 19.2 12 19.2C13.61 19.2 15.13 18.77 16.48 17.99" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Botón -->
                    <button type="submit"
                            class="mt-11 flex h-[50px] w-full items-center justify-center rounded-lg bg-[#155b66] px-6 text-[16px] font-bold text-white transition hover:bg-[#104d56]">
                        Iniciar sesión
                    </button>

                    <!-- Links -->
                    <div class="mt-10 space-y-6">
                        <a href="#"
                           class="block text-[18px] font-normal text-[#0066c9] transition hover:underline">
                            ¿Olvidaste tu correo electrónico?
                        </a>

                        <a href="#"
                           class="block text-[18px] font-normal text-[#0066c9] transition hover:underline">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const togglePassword = document.getElementById("togglePassword");
            const passwordInput = document.getElementById("password");
            const eyeOpen = document.getElementById("eyeOpen");
            const eyeClosed = document.getElementById("eyeClosed");

            if (togglePassword && passwordInput) {
                togglePassword.addEventListener("click", function () {
                    const isPassword = passwordInput.type === "password";
                    passwordInput.type = isPassword ? "text" : "password";

                    eyeOpen.classList.toggle("hidden", isPassword);
                    eyeClosed.classList.toggle("hidden", !isPassword);
                });
            }
        });
    </script>
</body>
</html>
